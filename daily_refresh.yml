name: Daily NBA Data Refresh

on:
  schedule:
    - cron: "0 14 * * *"   # 9am ET (UTC-5) every day
  workflow_dispatch:         # also lets you trigger manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run scrapers
        run: uv run python scrapers/scrape_all.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily data refresh $(date -u +'%Y-%m-%d')"
          git push
